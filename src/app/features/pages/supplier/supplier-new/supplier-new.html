<p-dialog [visible]="visible()" (visibleChange)="visibleChange.emit($event)" [modal]="true" [draggable]="false"
    [resizable]="false" [style]="{ width: '500px' }" [header]="esEdicion() ? 'Editar Proveedor' : 'Nuevo Proveedor'">

    <div class="flex flex-col gap-4 py-2">

        @if (error()) {
        <div class="p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs flex items-center gap-2">
            <i class="pi pi-exclamation-circle"></i>
            {{ error() }}
        </div>
        }

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                Nombre <span class="text-red-400">*</span>
            </label>
            <input pInputText type="text" placeholder="Nombre del proveedor" class="w-full text-sm"
                [value]="form().name" (input)="updateField('name', $any($event.target).value)" />
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">RUC</label>
            <input pInputText type="text" placeholder="20512345678" class="w-full text-sm" [value]="form().ruc"
                (input)="updateField('ruc', $any($event.target).value)" />
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Teléfono</label>
                <input pInputText type="text" placeholder="01-1234567" class="w-full text-sm" [value]="form().phone"
                    (input)="updateField('phone', $any($event.target).value)" />
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Email</label>
                <input pInputText type="text" placeholder="contacto@empresa.com" class="w-full text-sm"
                    [value]="form().email" (input)="updateField('email', $any($event.target).value)" />
            </div>
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Dirección</label>
            <input pInputText type="text" placeholder="Av. Principal 123, Ciudad" class="w-full text-sm"
                [value]="form().address" (input)="updateField('address', $any($event.target).value)" />
        </div>

    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2 pt-2">
            <button type="button" (click)="onCerrar()"
                class="px-4 py-2 rounded-xl text-xs font-bold text-gray-600 border border-gray-200 hover:bg-gray-50 transition-all cursor-pointer">
                Cancelar
            </button>
            <button type="button" (click)="onGuardar()" [disabled]="loading()"
                class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold bg-pink-500 hover:bg-pink-600 text-white transition-all shadow-sm cursor-pointer disabled:opacity-50">
                <i [class]="loading() ? 'pi pi-spin pi-spinner' : 'pi pi-check'" class="text-xs"></i>
                {{ esEdicion() ? 'Actualizar' : 'Registrar' }}
            </button>
        </div>
    </ng-template>

</p-dialog>
