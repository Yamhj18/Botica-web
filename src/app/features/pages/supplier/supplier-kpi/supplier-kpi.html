<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Proveedores</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ totalProveedores() }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-list"></i> Registrados
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-truck text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-green-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Activos</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ activos() }}</span>
                <span class="text-xs font-bold text-green-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-check-circle"></i> En operación
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-green-50 flex items-center justify-center">
                <i class="pi pi-check-circle text-green-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-red-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Inactivos</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ inactivos() }}</span>
                <span class="text-xs font-bold text-red-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-ban"></i> Sin operación
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center">
                <i class="pi pi-ban text-red-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-blue-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Con RUC</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ conRuc() }}</span>
                <span class="text-xs font-bold text-blue-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-id-card"></i> Verificados
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center">
                <i class="pi pi-id-card text-blue-500 text-xl"></i>
            </div>
        </div>
    </div>

</div>
