<div class="w-full bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-4">

    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-xs font-bold text-gray-700 flex items-center gap-1.5 uppercase tracking-wider">
                <i class="pi pi-filter text-pink-500 text-xs"></i>
                Filtros de Búsqueda
            </h3>
            <p class="text-[11px] text-gray-400 mt-0.5">Refina el listado en tiempo real.</p>
        </div>
    </div>

    <hr class="border-gray-100">

    <div class="flex flex-col md:flex-row items-stretch md:items-center gap-4">

        <div class="flex flex-col gap-1.5 w-full md:max-w-xs">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Buscar por nombre</label>
            <p-iconfield class="w-full">
                <p-inputicon styleClass="pi pi-search text-gray-400 text-sm" />
                <input pInputText type="text" placeholder="Escribe una categoría..."
                    class="w-full text-xs py-2.5 rounded-xl border-gray-200 focus:border-pink-300 cursor-pointer"
                    [value]="busquedaValue()" (input)="busquedaChange.emit($any($event.target).value)" />
            </p-iconfield>
        </div>

        <div class="flex flex-col gap-1.5 w-full md:w-auto">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Filtrar por Estado</label>
            <div
                class="bg-gray-50/60 border border-pink-100/70 rounded-xl p-1 flex flex-row gap-1 items-center h-[38px]">

                <button type="button" (click)="estadoChange.emit('')"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs transition-all cursor-pointer h-full whitespace-nowrap"
                    [ngClass]="estadoValue() === ''
            ? 'bg-pink-500 text-white shadow-sm font-bold'
            : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'">
                    <i class="pi pi-th-large text-[10px]"></i>
                    <span>Todos</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded-full"
                        [ngClass]="estadoValue() === '' ? 'bg-white/20 text-white' : 'bg-gray-200/70 text-gray-400'">
                        {{ totalLaboratories() }}
                    </span>
                </button>

                <button type="button" (click)="estadoChange.emit('activo')"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs transition-all cursor-pointer h-full whitespace-nowrap"
                    [ngClass]="estadoValue() === 'activo'
            ? 'bg-pink-500 text-white shadow-sm font-bold'
            : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'">
                    <i class="pi pi-check-circle text-[10px]"></i>
                    <span>Activos</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded-full"
                        [ngClass]="estadoValue() === 'activo' ? 'bg-white/20 text-white' : 'bg-pink-50 text-pink-400'">
                        {{ totalActivas() }}
                    </span>
                </button>

                <button type="button" (click)="estadoChange.emit('inactivo')"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs transition-all cursor-pointer h-full whitespace-nowrap"
                    [ngClass]="estadoValue() === 'inactivo'
            ? 'bg-pink-500 text-white shadow-sm font-bold'
            : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'">
                    <i class="pi pi-ban text-[10px]"></i>
                    <span>Inactivos</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded-full"
                        [ngClass]="estadoValue() === 'inactivo' ? 'bg-white/20 text-white' : 'bg-pink-50 text-pink-400'">
                        {{ totalInactivas() }}
                    </span>
                </button>

            </div>
        </div>

    </div>

</div>
