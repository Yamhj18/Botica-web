<div class="p-4 flex flex-col gap-6">

    <app-purchase-kpi [totalCompras]="totalCompras()" [montoTotal]="montoTotal()"
        [proveedoresDistintos]="proveedoresDistintos()" [promedioPorCompra]="promedioPorCompra()" />

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

        <div class="lg:col-span-3">
            <app-purchase-table [compras]="filtrados()" [loading]="loading()" [error]="error()"
                (verDetalle)="onVerDetalle($event)" (nuevaCompra)="showDetalle.set(true)" />
        </div>
        <app-purchase-sidebar [compras]="compras()" [busqueda]="busqueda()"
            [proveedorSeleccionado]="proveedorSeleccionado()" [proveedores]="proveedores()"
            (busquedaChange)="onBusqueda($event)" (proveedorChange)="onProveedorChange($event)"
            (limpiarFiltros)="onLimpiarFiltros()" />


    </div>

    <app-purchase-detail [compra]="compraSeleccionada()" [visible]="showDetalle()"
        (visibleChange)="showDetalle.set($event)" />

</div>
