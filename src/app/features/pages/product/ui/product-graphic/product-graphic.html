<div class="w-full bg-white rounded-2xl p-5 shadow-sm border border-gray-100">

    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
        <div>
            <p class="text-sm font-bold text-slate-700">Crecimiento de Productos</p>
            <p class="text-xs text-slate-400 mt-0.5">Productos registrados en el tiempo</p>
        </div>
        <div class="w-9 h-9 rounded-xl bg-pink-50 border border-pink-100 flex items-center justify-center">
            <i class="pi pi-chart-line text-pink-400 text-sm"></i>
        </div>
    </div>

    <!-- Toggle de periodo -->
    <div class="flex gap-2 mb-4">
        @for(opcion of opcionesPeriodo; track opcion.value) {
        <button type="button" (click)="onPeriodoChange(opcion.value)"
            class="px-3 py-1.5 rounded-xl text-xs font-bold border transition-all cursor-pointer" [ngClass]="periodo() === opcion.value
          ? 'bg-pink-500 text-white border-pink-500'
          : 'bg-white text-slate-500 border-gray-200 hover:border-pink-200 hover:text-pink-400'">
            {{ opcion.label }}
        </button>
        }
    </div>

    <!-- Gráfica -->
    <div class="h-[260px]">
        <p-chart type="line" [data]="chartData()" [options]="chartOptions()" height="260px" />
    </div>

</div>
