<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Productos</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ total() }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-box"></i> Todos los registros
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-shopping-bag text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Productos Agotados</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ agotados() }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-exclamation-triangle"></i> Stock Cero
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-ban text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Por Vencer</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ porVencer() }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-clock"></i> Próximos 30 días
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-calendar-times text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-pink-100 rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">

            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-calculator text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

</div>
