<div class="w-full bg-white rounded-2xl p-5 shadow-sm border border-gray-100">

    <!-- Header de la card -->
    <div class="flex items-center justify-between mb-4">
        <div>
            <p class="text-sm font-bold text-slate-700">Usuarios por Rol</p>
            <p class="text-xs text-slate-400 mt-0.5">Activos e inactivos por cada rol</p>
        </div>
        <div class="w-9 h-9 rounded-xl bg-pink-50 border border-pink-100 flex items-center justify-center">
            <i class="pi pi-chart-bar text-pink-400 text-sm"></i>
        </div>
    </div>

    <!-- Gráfica -->
    <div class="h-[280px]">
        <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" height="280px" />
    </div>

</div>
