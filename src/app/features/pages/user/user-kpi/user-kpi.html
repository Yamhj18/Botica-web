<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Usuarios</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ total }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-users"></i> General
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-users text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Personal Activo</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ activos }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-pulse"></span> Operando
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-user-plus text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-white rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Restringidos</span>
                <span class="text-3xl font-black text-gray-800 m-0">{{ inactivos }}</span>
                <span class="text-xs font-bold text-pink-400 mt-1 flex items-center gap-1">
                    <i class="pi pi-user-minus"></i> Inactivos
                </span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-user-minus text-pink-500 text-xl"></i>
            </div>
        </div>
    </div>

    <div class="card bg-pink-100 rounded-2xl border border-pink-100 shadow-sm p-6">
        <div class="flex items-start justify-between">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Detalles</span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-pink-50 flex items-center justify-center">
                <i class="pi pi-info-circle text-slate-500 text-base"></i>
            </div>
        </div>
    </div>

</div>
