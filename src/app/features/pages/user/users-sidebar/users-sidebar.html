<aside class="w-80 bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-5 h-fit">

  <div>
    <h3 class="text-sm font-bold text-gray-700 mb-1">Filtros de Búsqueda</h3>
    <p class="text-[11px] text-gray-400">Refina el listado de usuarios en tiempo real.</p>
  </div>

  <hr class="border-gray-100">

  <div class="flex flex-col gap-2">
    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Buscar por nombre</label>
    <p-iconfield class="w-full">
      <p-inputicon styleClass="pi pi-search text-gray-400 text-sm" />
      <input pInputText type="text" placeholder="Escribe para buscar..."
        class="w-full text-xs py-2.5 rounded-xl border-gray-200 focus:border-pink-300 cursor-pointer"
        [ngModel]="busquedaValue()" (ngModelChange)="busquedaChange.emit($event)" />
    </p-iconfield>
  </div>

  <div class="flex flex-col gap-4">

    <div class="bg-white border border-pink-100 rounded-2xl p-4 shadow-sm shrink-0">
      <p class="text-xs font-semibold text-pink-400 uppercase tracking-wider mb-4 flex items-center gap-1.5">
        <i class="pi pi-filter text-xs"></i> Filtrar por Rol
      </p>
      <div class="flex flex-col gap-1">

        <button
          class="flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all w-full text-left cursor-pointer"
          [ngClass]="roleValue() === ''
          ? 'bg-pink-500 text-white shadow-sm'
          : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'" (click)="seleccionarRol('')">
          <div class="flex items-center gap-2">
            <i class="pi pi-th-large text-xs"></i>
            <span class="font-medium">Todos</span>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full" [ngClass]="roleValue() === ''
            ? 'bg-white/20 text-white'
            : 'bg-gray-100 text-gray-400'">
            {{ totalUsuarios() }}
          </span>
        </button>

        <div class="border-t border-pink-50 my-2"></div>

        @for (role of roles; track role.value) {
        <button
          class="flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all w-full text-left cursor-pointer"
          [ngClass]="roleValue() === role.value
    ? 'bg-pink-500 text-white shadow-sm'
    : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'" (click)="seleccionarRol(role.value)">
          <div class="flex items-center gap-2">
            <i class="pi pi-id-card text-xs"></i>
            <span class="font-medium truncate">{{ role.label }}</span>
          </div>

          <span class="text-xs px-2 py-0.5 rounded-full shrink-0" [ngClass]="roleValue() === role.value
        ? 'bg-white/20 text-white'
        : 'bg-pink-50 text-pink-400'">
            {{ countsByRole()[role.value] }}
          </span>
        </button>
        }

      </div>
    </div>

    <div class="bg-white border border-pink-100 rounded-2xl p-4 shadow-sm shrink-0">
      <p class="text-xs font-semibold text-pink-400 uppercase tracking-wider mb-4 flex items-center gap-1.5">
        <i class="pi pi-filter text-xs"></i> Filtrar por Estado
      </p>
      <div class="flex flex-col gap-1">

        <button
          class="flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all w-full text-left cursor-pointer"
          [ngClass]="estadoValue() === ''
          ? 'bg-pink-500 text-white shadow-sm'
          : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'" (click)="seleccionarEstado('')">
          <div class="flex items-center gap-2">
            <i class="pi pi-th-large text-xs"></i>
            <span class="font-medium">Todos</span>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full" [ngClass]="estadoValue() === ''
            ? 'bg-white/20 text-white'
            : 'bg-gray-100 text-gray-400'">
            {{ totalUsuarios() }}
          </span>
        </button>

        <div class="border-t border-pink-50 my-2"></div>

        @for (est of estados; track est.value) {
        <button
          class="flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all w-full text-left cursor-pointer"
          [ngClass]="estadoValue() === est.value
            ? 'bg-pink-500 text-white shadow-sm'
            : 'text-gray-500 hover:bg-pink-50 hover:text-pink-500'" (click)="seleccionarEstado(est.value)">
          <div class="flex items-center gap-2">
            <i class="pi pi-info-circle text-xs"></i>
            <span class="font-medium truncate">{{ est.label }}</span>
          </div>
          @if (est.value === 'activo') {
          <span class="text-xs px-2 py-0.5 rounded-full shrink-0" [ngClass]="estadoValue() === est.value
                ? 'bg-white/20 text-white'
                : 'bg-pink-50 text-pink-400'">
            {{ activo() }}
          </span>
          } @else {
          <span class="text-xs px-2 py-0.5 rounded-full shrink-0" [ngClass]="estadoValue() === est.value
                ? 'bg-white/20 text-white'
                : 'bg-pink-50 text-pink-400'">
            {{ inactivo() }}
          </span>
          }
        </button>
        }

      </div>
    </div>

  </div>

</aside>
