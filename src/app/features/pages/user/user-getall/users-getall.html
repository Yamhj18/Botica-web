<div class="flex flex-row gap-6 items-stretch w-full">

  <div class="flex-1 min-w-0 rounded-2xl p-6 flex flex-col gap-6">
    <app-user-kpi [total]="totalUsuarios()" [activos]="totalActivos()" [inactivos]="totalInactivos()">
    </app-user-kpi>

    <app-users-table class="flex-1" [usuariosData]="filtrados()" [loadingState]="loading()"
      (editarUser)="onEditar($event)" (cambiarPassword)="onChangePassword($event)"
      (cambiarEstado)="onToggleStatus($event)" (crearUsuario)="onCrearUsuario()" />
  </div>

  <div class=" rounded-2xl p-6 flex flex-col">
    <app-users-sidebar class="h-full" [busquedaValue]="busqueda()" [roleValue]="rol()" [estadoValue]="estado()"
      [totalUsuarios]="totalUsuarios()" [activo]="totalActivos()" [inactivo]="totalInactivos()"
      [countsByRole]="totalesPorRol()" (busquedaChange)="onBusquedaChange($event)" (roleChange)="rol.set($event)"
      (estadoChange)="estado.set($event)" (crearUsuario)="onCrearUsuario()" (exportarCSV)="exportCSV()" />
  </div>

</div>

<div class="rounded-2xl p-6">
  <app-user-graphic [usuarios]="usuarios()" />
</div>

<p-dialog [visible]="showInsertDialog()" (visibleChange)="showInsertDialog.set($event)" [modal]="true"
  [draggable]="false" [resizable]="false" [style]="{ width: '52rem' }" [breakpoints]="{ '768px': '95vw' }"
  [dismissableMask]="true" styleClass="!rounded-2xl !p-0 overflow-hidden" (onHide)="insertUserComp.resetForm()">

  <ng-template #header>
    <div class="flex items-center gap-4 py-1">
      <div
        class="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 border border-pink-200 shrink-0">
        <i class="pi pi-user-plus text-xl"></i>
      </div>
      <div class="text-left">
        <h2 class="font-bold text-base md:text-lg text-slate-700 leading-tight">Registrar Nuevo Usuario</h2>
        <p class="text-xs text-slate-400 mt-0.5 leading-normal font-normal">
          Complete el formulario para crear una nueva cuenta en el sistema de la botica.
        </p>
      </div>
    </div>
  </ng-template>

  <ng-template #icons>
    <button class="p-dialog-header-icon p-link" (click)="showInsertDialog.set(false)">
      <i class="pi pi-times"></i>
    </button>
  </ng-template>

  <app-users-insert #insertUserComp (usuarioRegistrado)="onUsuarioRegistrado()"
    (cerrarDialog)="showInsertDialog.set(false)" />

</p-dialog>
