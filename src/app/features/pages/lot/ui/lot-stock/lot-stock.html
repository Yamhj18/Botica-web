<div class="w-full h-full bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
    <div class="flex items-center justify-between mb-4">
        <div>
            <p class="text-sm font-bold text-slate-700">Top 10 Lotes por Stock</p>
            <p class="text-xs text-slate-400 mt-0.5">Mayor cantidad disponible en almacén</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-2xl font-black text-slate-700 leading-none">{{ lotes().length }}</p>
                <p class="text-[10px] text-slate-400 mt-0.5">lotes</p>
            </div>
            <div class="w-9 h-9 rounded-xl bg-pink-50 border border-pink-100 flex items-center justify-center">
                <i class="pi pi-chart-bar text-pink-400 text-sm"></i>
            </div>
        </div>
    </div>

    @if (lotes().length === 0) {
    <div class="flex flex-col items-center justify-center h-[240px] gap-2 text-slate-300">
        <i class="pi pi-chart-bar text-4xl"></i>
        <p class="text-xs">Sin lotes para mostrar</p>
    </div>
    } @else {
    <div class="h-[240px]">
        <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" height="240px" />
    </div>
    }
</div>
