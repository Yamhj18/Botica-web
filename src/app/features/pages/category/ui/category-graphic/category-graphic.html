<div class="w-full h-full bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col">

    <div class="flex items-center justify-between mb-4">
        <div>
            <p class="text-sm font-bold text-slate-700">Productos por Categoría</p>
            <p class="text-xs text-slate-400 mt-0.5">Distribución de productos registrados</p>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex flex-col items-end">
                <p class="text-2xl font-black text-slate-700 leading-none">{{ categorias().length }}</p>
                <p class="text-[10px] text-slate-400 mt-0.5">categorías</p>
            </div>

            <div class="w-9 h-9 rounded-xl bg-pink-50 border border-pink-100 flex items-center justify-center">
                <i class="pi pi-chart-bar text-pink-400 text-sm"></i>
            </div>
        </div>
    </div>

    <div class="flex-1 min-h-0">
        <p-chart type="bar" [data]="chartData()" [options]="chartOptions()" height="100%" />
    </div>

</div>
