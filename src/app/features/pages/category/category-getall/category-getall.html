<div class="p-6 flex flex-col gap-6">

    <app-category-sidebar [busquedaValue]="busqueda()" [estadoValue]="estadoFiltro()"
        [totalCategorias]="totalCategorias()" [totalActivas]="totalActivas()" [totalInactivas]="totalInactivas()"
        (busquedaChange)="onBusquedaChange($event)" (estadoChange)="onEstadoChange($event)"
        (crearCategoria)="onCrearCategoria()" />

    <div class="grid grid-cols-1 lg:grid-cols-10 gap-6 items-stretch">

        <div class="col-span-6">
            <app-category-table class="w-full" [categorias]="filtrados()" [total]="totalCategorias()"
                [loading]="loading()" [error]="error()" (crearCategoria)="onCrearCategoria()"
                (onEdit)="onEditar($event)" (onToggleStatus)="onToggleStatus($event)" (onDelete)="onEliminar($event)" />
        </div>

        <div class="col-span-4 flex">
            <app-category-graphic class="flex-1" [categorias]="categorias()"
                [productos]="productos()"></app-category-graphic>
        </div>

    </div>

    <app-category-insert [visible]="showInsertDialog()" (onClose)="onCategoriaRegistrada()"
        (onCrearCategoria)="onCategoriaRegistrada()"></app-category-insert>
</div>
